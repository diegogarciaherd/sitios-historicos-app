{% extends "layout.html" %}
{% block title %}Crear sitio histórico{% endblock %}
{% block content %}
<h1>Crear sitio histórico</h1>

<form action="{{ url_for('sites.create_site') }}" method="post">
  <div>
    <label>Nombre</label>
    <input type="text" name="nombre" required>
  </div>
  <div>
    <label>Descripción breve</label>
    <textarea name="descripcionBreve" required></textarea>
  </div>
  <div>
    <label>Descripción completa</label>
    <textarea name="descripcionCompleta"></textarea>
  </div>
  <div>
    <label>Ciudad</label>
    <input type="text" name="ciudad" required>
  </div>
  <div>
    <label>Provincia</label>
    <input type="text" name="provincia" required>
  </div>
  <div>
    <label>Latitud</label>
    <input type="number" step="any" name="latitud" required>
  </div>
  <div>
    <label>Longitud</label>
    <input type="number" step="any" name="longitud" required>
  </div>
  <div>
    <label>Estado de conservación</label>
    <select name="estado" required>
      <option value="BUENO">Bueno</option>
      <option value="REGULAR">Regular</option>
      <option value="MALO">Malo</option>
    </select>
  </div>
  <div>
    <label>Año de inauguración</label>
    <input type="number" name="añoInauguracion">
  </div>
  <div>
    <label>Categoría</label>
    <input type="text" name="categoria_nombre" required>
  </div>
  <div>
    <label>Visible</label>
    <input type="checkbox" name="visible">
  </div>

  <button type="submit">Crear</button>
</form>
{% endblock %}
