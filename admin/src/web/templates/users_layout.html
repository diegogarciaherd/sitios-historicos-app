{% extends "layout.html" %} {% block title %}Sitios históricos{% endblock %} {%
block admin_navigation_links %}
<div class="nav-section">
    <a href="{{ url_for('adminpanel.create_user') }}">Crear usuario</a>
    <a href="{{ url_for('adminpanel.list_users') }}">Buscar usuario</a>
</div>
{% endblock %} {% block head_styles %}
<style>
    .hidden {
        visibility: hidden;
    }

    .users-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin: 0;
        flex: 1;
        margin-top: 1rem;
    }

    .users-list .user-card {
        display: flex;
        align-items: center;
        padding: 1rem;
        gap: 1rem;
    }

    .user-card {
        width: fit-content;
        margin-left: 1rem;
        border: 1px solid black;
        border-radius: 10px;
        background-color: white;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .btn {
        border: none;
        border-radius: 0.5rem;
        padding: 1rem 2rem;
        font-family: var(--font-primary);
        color: var(--background);
        transition: color 0.3s ease, transform 0.3s ease;
    }

    .edit-btn {
        background-color: blue;
    }

    .delete-btn {
        background-color: red;
    }

    @media (max-width: 768px) {
        .users-list .user-card {
            flex-direction: column;
            align-items: stretch;
            text-align: center;
        }
    }
</style>

{% endblock %}
