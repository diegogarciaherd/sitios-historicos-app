<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Mi App{% endblock %}</title>
        {% block head_styles %}
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/styles.css') }}"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lexend:wght@100..900&display=swap"
            rel="stylesheet"
        />
        {% endblock %}
    </head>
    <body>
        <header>
            <a
                href="{{ url_for('home') }}"
                style="width: 16rem; text-align: left"
            >
                <h1>Registro de sitios históricos</h1>
            </a>
            <div class="dropdown">
                <button class="btn-outline">Cuenta</button>
                <div class="dropdown-content">
                    <a>Ver perfil</a>
                    <a>Cerrar sesión</a>
                </div>
            </div>
        </header>

        <aside>
            <nav>
                <a>Gestion de sitios históricos</a>
                <a>Validación de propuestas</a>
                <a>Moderación de reseñas</a>
                <a>Gestión de usuarios</a>
            </nav>
        </aside>

        <main>{% block content %}{% endblock %}</main>

        <footer>
            <p>&copy; 2025 Grupo 45</p>
        </footer>
    </body>
</html>
