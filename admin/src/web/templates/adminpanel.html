<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Mi App{% endblock %}</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/styles.css') }}"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Lexend:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <style>
            .hidden {
                visibility: hidden;
            }

            .users-list {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                margin: 0;
                flex: 1;
                margin-top: 1rem;
            }

            .users-list .user-card {
                display: flex;
                align-items: center;
                padding: 1rem;
                gap: 1rem;
            }

            .user-card {
                width: fit-content;
                margin-left: 1rem;
                border: 1px solid black;
                border-radius: 10px;
                background-color: white;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            }

            .btn {
                border: none;
                border-radius: 0.5rem;
                padding: 1rem 2rem;
                font-family: var(--font-primary);
                color: var(--background);
                transition: color 0.3s ease, transform 0.3s ease;
            }

            .edit-btn {
                background-color: blue;
            }

            .delete-btn {
                background-color: red;
            }

            @media (max-width: 768px) {
                .users-list .user-card {
                    flex-direction: column;
                    align-items: stretch;
                    text-align: center;
                }
            }
        </style>
        {% block head_styles %} {% endblock %}
    </head>
    <body>
        <header>
            {% if logged_user %}
            <div class="dropdown">
                <button class="btn-outline">Cuenta</button>
                <div class="dropdown-content">
                    <p class="email">Cuenta: {{ logged_user }}</p>
                    <a>Ver perfil</a>
                    <a href="/logout">Cerrar sesión</a>
                </div>
            </div>
            {% else %}
            <form action="/login" method="get">
                <button class="btn-outline">Iniciar sesion</button>
            </form>
            {% endif %}
        </header>

        <aside>
            <a
                href="{{ url_for('home') }}"
                style="
                    width: 16rem;
                    text-align: left;
                    display: flex;
                    align-items: center;
                    flex-direction: row;
                    gap: 1rem;
                    padding-left: 0.5rem;
                "
            >
                <img
                    src="{{ url_for('static', filename='images/escudo_argentino.png') }}"
                    alt="Registro de sitios históricos"
                    style="width: 10%; height: auto"
                />
                <h3>
                    Registro de sitios <br />
                    históricos
                </h3>
            </a>
            <nav>
                <a href="/panel-de-admin/crear-usuario">Crear un usuario</a>
                <a href="/panel-de-admin/buscar-usuarios">Buscar usuario(s)</a>
            </nav>
        </aside>

        <main>
            {% block content %}
                <h1 class="bold-title">Gestion de usuarios</h1>
            {% endblock %}
        </main>

        <footer>
            <p>&copy; 2025 Grupo 45</p>
        </footer>
    </body>
</html>
